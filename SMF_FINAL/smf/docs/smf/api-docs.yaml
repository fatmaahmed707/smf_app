    delete:
      summary: Delete an announcement
      operationId: >-
        home_joe-arch_documents_bruno_smf_security_management_framework_api_announcement-controller_delete_announcement_yml
      description: >-
        Deletes an announcement by its UUID. Can be used to cancel a SCHEDULED
        announcement before it is dispatched. Requires ADMIN role.
      tags:
        - announcement-controller
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                  time:
                    type: string
              example:
                success: true
                message: Announcement deleted successfully
                data: {}
                time: '2024-01-15T10:30:00Z'
        '404':
          description: Not Found
        parameters:
          - name: id
            in: path
            description: UUID of the announcement to delete
            required: true
            schema:
              type: string
      security:
        - delete_announcement: []
